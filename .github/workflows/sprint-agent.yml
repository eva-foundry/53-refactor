# Sprint Agent Workflow -- 53-refactor
# Trigger: GitHub Issue labeled "sprint-task"
# Model:   gpt-4o-mini via GitHub Models API (free tier)
#
# Processes a FULL SPRINT from one issue:
#   - Parses the sprint issue body to extract SPRINT_MANIFEST JSON
#   - Executes each story in sequence: D->P->D->C->A
#   - Posts a progress comment after EACH story
#   - Posts a final sprint summary comment when all stories complete
#   - Updates data model with status and telemetry
#   - Generates evidence receipts in .eva/evidence/
#
# Issue format: see .github/SPRINT_ISSUE_TEMPLATE.md
# Manifest format: <!-- SPRINT_MANIFEST { ... } -->

name: Sprint Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Sprint issue number
        required: true
        type: number

jobs:
  sprint:
    name: "Execute Sprint"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'sprint-task')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet requests openai ruff pytest pytest-asyncio httpx

      - name: Resolve issue number
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ISSUE_NUM=${{ inputs.issue_number }}" >> "$GITHUB_ENV"
          else
            echo "ISSUE_NUM=${{ github.event.issue.number }}" >> "$GITHUB_ENV"
          fi

      - name: Configure git identity
        run: |
          git config user.name "REFACTOR Sprint Agent"
          git config user.email "agent@eva-foundry.dev"

      - name: Run sprint agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REFACTOR_DATA_MODEL_URL: https://marco-eva-data-model.livelyflower-7990bc7b.canadacentral.azurecontainerapps.io
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_WORKITEMS_PAT: ${{ secrets.ADO_WORKITEMS_PAT }}
        run: |
          python3 .github/scripts/sprint_agent.py \
            --issue "$ISSUE_NUM" \
            --repo "$GH_REPO"

      - name: Upload sprint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "sprint-issue-${{ env.ISSUE_NUM }}-artifacts"
          path: |
            sprint-state.json
            sprint-summary.md
            .eva/evidence/
            .eva/sprints/
            .eva/traces/
            .eva/locks/
            lint-result.txt
            test-collect.txt
          retention-days: 30
          if-no-files-found: warn
